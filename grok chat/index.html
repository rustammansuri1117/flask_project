<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GROK CHAT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #030a0e;
    --panel:     #060f15;
    --border:    #0ff3;
    --cyan:      #00f5ff;
    --cyan-dim:  #00f5ff55;
    --green:     #00ff88;
    --red:       #ff3c5a;
    --yellow:    #ffd600;
    --text:      #c8eaf0;
    --dim:       #4a7080;
    --glow:      0 0 12px #00f5ff66, 0 0 30px #00f5ff22;
    --glow-sm:   0 0 6px #00f5ff88;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: none;
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed;
    width: 18px; height: 18px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform .1s, width .2s, height .2s, border-color .2s;
    box-shadow: var(--glow-sm);
  }
  #cursor.clicking { width: 10px; height: 10px; border-color: var(--green); }

  /* ── Scanline overlay ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.08) 2px,
      rgba(0,0,0,.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ── Grid background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 10;
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #0a1a22 0%, transparent 100%);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: .2em;
    color: var(--cyan);
    text-shadow: var(--glow);
    animation: flicker 8s infinite;
  }
  .logo span { color: var(--green); }

  @keyframes flicker {
    0%,94%,96%,98%,100% { opacity: 1; }
    95%,97%,99% { opacity: .85; }
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: .7rem;
    color: var(--dim);
    letter-spacing: .1em;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
    display: inline-block;
    margin-right: 6px;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .3; }
  }

  .model-badge {
    border: 1px solid var(--cyan-dim);
    padding: 3px 10px;
    border-radius: 2px;
    color: var(--cyan);
    font-size: .68rem;
    letter-spacing: .12em;
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: .68rem;
    padding: 4px 12px;
    cursor: none;
    letter-spacing: .1em;
    transition: all .2s;
  }
  .btn-clear:hover {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 8px #ff3c5a44;
  }

  /* ── Messages area ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 10;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 2px; }

  /* ── Message bubbles ── */
  .msg {
    display: flex;
    gap: 14px;
    animation: msgIn .3s ease-out;
    max-width: 820px;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: .6rem;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: .05em;
  }
  .msg.user .avatar {
    background: #0a1e28;
    border: 1px solid var(--green);
    color: var(--green);
    box-shadow: 0 0 8px #00ff8833;
  }
  .msg.bot .avatar {
    background: #0a1e28;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    box-shadow: var(--glow-sm);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 2px;
    line-height: 1.65;
    font-size: .88rem;
    max-width: 680px;
    word-break: break-word;
    position: relative;
  }

  .msg.user .bubble {
    background: #0b2030;
    border: 1px solid var(--green);
    border-top-right-radius: 0;
    color: #b0f0d0;
    box-shadow: 0 0 12px #00ff8818;
  }

  .msg.bot .bubble {
    background: #08181f;
    border: 1px solid var(--cyan-dim);
    border-top-left-radius: 0;
    color: var(--text);
    box-shadow: 0 0 12px #00f5ff0a;
  }

  .msg-label {
    font-size: .62rem;
    letter-spacing: .15em;
    margin-bottom: 5px;
    opacity: .5;
  }
  .msg.user .msg-label { color: var(--green); text-align: right; }
  .msg.bot  .msg-label { color: var(--cyan); }

  /* ── Typing indicator ── */
  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 6px 0;
    align-items: center;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    animation: dot 1.2s infinite;
    opacity: .3;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot {
    0%,80%,100% { opacity: .3; transform: scale(.8); }
    40%         { opacity: 1;  transform: scale(1.2); }
  }

  /* ── Welcome screen ── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 18px;
    opacity: .6;
    pointer-events: none;
    user-select: none;
  }
  #welcome .big { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; color: var(--cyan); text-shadow: var(--glow); letter-spacing: .3em; }
  #welcome .sub { font-size: .8rem; letter-spacing: .2em; color: var(--dim); }
  #welcome .hint { font-size: .72rem; color: var(--dim); border: 1px solid var(--border); padding: 6px 16px; letter-spacing: .1em; }

  /* ── Input area ── */
  footer {
    position: relative;
    z-index: 10;
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: linear-gradient(0deg, #050e14 0%, transparent 100%);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    position: relative;
    border: 1px solid var(--cyan-dim);
    border-radius: 2px;
    background: #08161e;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-wrap:focus-within {
    border-color: var(--cyan);
    box-shadow: var(--glow-sm);
  }

  #input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: .9rem;
    padding: 12px 16px;
    resize: none;
    min-height: 48px;
    max-height: 140px;
    line-height: 1.5;
    caret-color: var(--cyan);
  }

  #input::placeholder { color: var(--dim); }

  .input-prefix {
    position: absolute;
    left: 14px; top: 14px;
    color: var(--cyan);
    font-size: .9rem;
    pointer-events: none;
    opacity: .5;
  }

  #input { padding-left: 30px; }

  #send {
    width: 48px; height: 48px;
    background: var(--cyan);
    border: none;
    border-radius: 2px;
    cursor: none;
    color: var(--bg);
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, box-shadow .2s, transform .1s;
    flex-shrink: 0;
    font-family: 'Share Tech Mono', monospace;
  }
  #send:hover { background: #33faff; box-shadow: var(--glow); }
  #send:active { transform: scale(.93); }
  #send:disabled { background: var(--dim); box-shadow: none; opacity: .5; }

  .footer-meta {
    margin-top: 8px;
    font-size: .65rem;
    color: var(--dim);
    letter-spacing: .08em;
    display: flex;
    justify-content: space-between;
  }

  #char-count { color: var(--dim); }
  #char-count.warn { color: var(--yellow); }

  /* ── Corner decorations ── */
  .corner {
    position: fixed;
    width: 20px; height: 20px;
    border-color: var(--cyan-dim);
    border-style: solid;
    pointer-events: none;
    z-index: 200;
  }
  .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  /* ── Error toast ── */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a0810;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 10px 20px;
    font-size: .8rem;
    letter-spacing: .1em;
    z-index: 500;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="cursor"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div id="toast"></div>

<header>
  <div class="logo">RusWeb<span>.</span>Ai</div>
  <div class="header-meta">
    <div><span class="status-dot"></span>ONLINE</div>
    <div class="model-badge">llama-3.3-70b-versatile</div>
    <button class="btn-clear" onclick="clearChat()">[ CLEAR ]</button>
  </div>
</header>

<div id="messages">
  <div id="welcome">
    <div class="big">RusWeb.Ai</div>
    <div class="sub">POWERED BY RusWeb.Ai</div>
    <div class="hint">TYPE A MESSAGE TO BEGIN</div>
  </div>
</div>

<footer>
  <div class="input-row">
    <div class="input-wrap">
      <span class="input-prefix">▶</span>
      <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
    </div>
    <button id="send" onclick="sendMessage()" title="Send">⏎</button>
  </div>
  <div class="footer-meta">
    <span>SHIFT+ENTER for new line · ENTER to send</span>
    <span id="char-count">0 / 4000</span>
  </div>
</footer>

<script>
  const API_KEY   = "";        // key is safe inside server.py
  const BASE_URL  = "/chat";   // local proxy → no CORS issues
  const MODEL     = "llama-3.3-70b-versatile";
  const MAX_TOKENS = 1024;
  const SYSTEM    = "You are a witty and helpful AI assistant. You are honest, direct, and a bit irreverent. Keep answers concise unless the user asks for detail.";

  let history = [{ role: "system", content: SYSTEM }];
  let isThinking = false;

  // ── Custom cursor ──
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
  document.addEventListener('mouseup',   () => cursor.classList.remove('clicking'));

  // ── Auto-resize textarea ──
  const input = document.getElementById('input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    const len = input.value.length;
    const cc = document.getElementById('char-count');
    cc.textContent = len + ' / 4000';
    cc.className = len > 3500 ? 'warn' : '';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = '⚠ ' + msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  // ── Scroll to bottom ──
  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  // ── Remove welcome screen ──
  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  // ── Append message ──
  function appendMsg(role, text) {
    removeWelcome();
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

    const label = role === 'user' ? 'YOU' : 'AI';
    const avatarText = role === 'user' ? 'YOU' : 'AI';

    wrap.innerHTML = `
      <div class="avatar">${avatarText}</div>
      <div>
        <div class="msg-label">${label}</div>
        <div class="bubble">${escHtml(text)}</div>
      </div>`;
    msgs.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  // ── Typing indicator ──
  function showTyping() {
    removeWelcome();
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = `
      <div class="avatar">AI</div>
      <div>
        <div class="msg-label">AI</div>
        <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
      </div>`;
    msgs.appendChild(wrap);
    scrollBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  // ── Escape HTML ──
  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  // ── Send message ──
  async function sendMessage() {
    if (isThinking) return;
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('char-count').textContent = '0 / 4000';

    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    isThinking = true;
    document.getElementById('send').disabled = true;
    showTyping();

    try {
      const res = await fetch(BASE_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: MODEL,
          messages: history,
          max_tokens: MAX_TOKENS,
          temperature: 0.7
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.choices[0].message.content;
      history.push({ role: 'assistant', content: reply });

      hideTyping();
      appendMsg('bot', reply);

    } catch (err) {
      hideTyping();
      showToast(err.message);
      history.pop(); // remove failed user message
    } finally {
      isThinking = false;
      document.getElementById('send').disabled = false;
      input.focus();
    }
  }

  // ── Clear chat ──
  function clearChat() {
    history = [{ role: 'system', content: SYSTEM }];
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `
      <div id="welcome">
        <div class="big">GROK</div>
        <div class="sub">POWERED BY GROQ API</div>
        <div class="hint">TYPE A MESSAGE TO BEGIN</div>
      </div>`;
  }

  // Focus input on load
  window.onload = () => input.focus();
</script>
</body>
</html>
